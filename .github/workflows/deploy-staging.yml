name: Deploy Staging

# 手动触发：在 GitHub UI 点 Run workflow，或 `gh workflow run deploy-staging.yml -r <branch>`，
# 或手机发 `/deploy <branch>` 给 claude-telegram bot。
# Staging = staging-deeppin.duckdns.org（共享生产 Supabase，与 prod 并存互不影响）。
# run-name 显示被部署的分支 / run-name shows which branch is being deployed
run-name: "Staging · ${{ inputs.branch }}"
on:
  workflow_dispatch:
    inputs:
      branch:
        # 必填，无默认 —— 防止误用 `gh workflow run -r BRANCH`（-r 只决定从哪个分支
        # 读 workflow 文件，不会传给 inputs）导致 input 取默认值 "main"，把 main 当成
        # 目标分支静默部署到 staging。
        # Required, no default — prevents the `gh workflow run -r BRANCH` footgun
        # (`-r` only selects which branch the workflow file is loaded from; it does
        # NOT populate inputs). Without this, inputs.branch would silently fall back
        # to a default and the wrong branch would be deployed.
        description: "Branch to deploy to staging (required, no default)"
        required: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration -q
        working-directory: backend
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_ANON_KEY: placeholder
          GROQ_API_KEYS: '["placeholder"]'
          LOG_DIR: /tmp/deeppin-logs

  deploy:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy branch to Oracle staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            BRANCH="${{ inputs.branch }}"
            STAGING_DIR=/home/ubuntu/deeppin-staging

            # 首次部署：clone；后续：fetch + 硬重置到目标分支
            if [ ! -d "$STAGING_DIR/.git" ]; then
              git clone https://github.com/zizhaof/deeppin.git "$STAGING_DIR"
              # 首次部署需要把 prod 的 .env 拷过来（共享 Supabase + API keys）
              cp /home/ubuntu/deeppin/backend/.env "$STAGING_DIR/backend/.env"
            fi

            cd "$STAGING_DIR"
            # The searxng container chowns its mounted config dir to its
            # internal UID (977), which then blocks ubuntu from unlinking
            # files inside it during a checkout. Reclaim ownership before
            # any git operation that touches the working tree. Same root
            # cause as the prod chain failure on 2026-04-24.
            sudo chown -R ubuntu:ubuntu searxng/
            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # staging 用独立 compose project name + 独立 env file（端口换掉）
            docker compose -p deeppin-staging --env-file compose.staging.env \
              -f docker-compose.yml -f docker-compose.staging.yml \
              up -d --build backend searxng

            # 等 healthy
            echo "等待 staging backend healthy..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' deeppin-staging-backend-1 2>/dev/null || echo "unknown")
              echo "  Attempt $i: staging-backend=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Staging backend healthy"
                break
              fi
              if [ "$i" -eq 24 ]; then
                docker compose -p deeppin-staging logs backend --tail 30
                exit 1
              fi
              sleep 5
            done

            # reload 主 nginx（让它识别 staging server block）
            docker exec deeppin-nginx-1 nginx -s reload || true

            docker image prune -f
            echo "Staging 部署完成: branch=$BRANCH"

  # ── Job 3: 集成测试（部署完成后，从 GitHub runner 打 staging endpoint）────
  # ── Job 3: integration tests, hits the freshly-deployed staging URL.
  integration-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest httpx

      - name: Run integration tests
        run: pytest tests/integration/ -v
        working-directory: backend
        env:
          TEST_BASE_URL: https://staging-deeppin.duckdns.org
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ── Job 4: 把部署的分支 force-push 到 'staging' 固定分支 ────────────────
  # Vercel 的 auto-branch-alias 会给 staging 分支稳定的 preview URL：
  #   https://deeppin-git-staging-zizhaofs-projects.vercel.app
  # 必须用 PAT 而不是 GITHUB_TOKEN —— GITHUB_TOKEN 做的 push 不会触发
  # 外部 webhook（防止 workflow 互相死循环），Vercel 就不会收到构建信号。
  #
  # ── Job 4: force-push the deployed branch to the 'staging' ref so
  # Vercel's auto branch-alias gives us a stable preview URL. Needs PAT:
  # GITHUB_TOKEN pushes don't fire external webhooks, so Vercel wouldn't
  # pick it up.
  sync-staging-branch:
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PAT_FOR_STAGING_PUSH }}

      - name: Force-push to 'staging' branch
        run: git push -f origin HEAD:staging
