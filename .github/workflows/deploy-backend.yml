name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'compose.env'
      - 'searxng/**'
      - 'nginx/**'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/deeppin
            git pull origin main

            # backend + searxng 先启动（nginx 等它们 healthy 才起）
            docker compose --env-file compose.env up -d --build backend searxng

            # 等待 backend 和 searxng 进入 healthy 状态（最多 90s）
            echo "等待服务 healthy... / Waiting for services to become healthy..."
            for i in $(seq 1 18); do
              BACKEND=$(docker inspect --format='{{.State.Health.Status}}' deeppin-backend-1 2>/dev/null || echo "unknown")
              SEARXNG=$(docker inspect --format='{{.State.Health.Status}}' deeppin-searxng-1 2>/dev/null || echo "unknown")
              echo "  Attempt $i: backend=$BACKEND searxng=$SEARXNG"
              if [ "$BACKEND" = "healthy" ] && [ "$SEARXNG" = "healthy" ]; then
                echo "所有依赖已就绪 / All dependencies healthy"
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "超时：服务未能在 90s 内进入 healthy 状态 / Timeout waiting for healthy"
                docker compose --env-file compose.env logs --tail 30
                exit 1
              fi
              sleep 5
            done

            # nginx 在依赖 healthy 后启动
            docker compose --env-file compose.env up -d nginx

            # 清理旧镜像
            docker image prune -f

            # Smoke test：端到端连通性验证
            echo "运行 smoke test... / Running smoke test..."
            sleep 5   # 给 nginx 一点时间完成启动
            bash scripts/smoke_test.sh https://deeppin.duckdns.org || {
              echo "=== Smoke test 失败，打印日志 / Smoke test failed, dumping logs ==="
              docker compose --env-file compose.env logs --tail 50
              exit 1
            }

            echo "部署完成 / Deployment complete"
