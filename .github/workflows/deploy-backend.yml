name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'compose.env'
      - 'searxng/**'
      - 'nginx/**'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/deeppin
            git pull origin main

            # backend + searxng 先启动（nginx 等它们 healthy 才起）
            docker compose --env-file compose.env up -d --build backend searxng

            # 等待 backend 进入 healthy 状态（backend /health 已聚合检查所有依赖）
            # Wait for backend to become healthy (backend /health checks all dependencies)
            echo "等待 backend healthy... / Waiting for backend to become healthy..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' deeppin-backend-1 2>/dev/null || echo "unknown")
              echo "  Attempt $i: backend=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Backend healthy，所有依赖就绪 / Backend healthy, all dependencies ready"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "超时：backend 未能在 120s 内进入 healthy 状态 / Timeout waiting for backend healthy"
                docker compose --env-file compose.env logs backend --tail 30
                exit 1
              fi
              sleep 5
            done

            # nginx 在依赖 healthy 后启动
            docker compose --env-file compose.env up -d nginx

            # 清理旧镜像
            docker image prune -f

            # Smoke test：端到端连通性验证
            echo "运行 smoke test... / Running smoke test..."
            sleep 5   # 给 nginx 一点时间完成启动
            bash scripts/smoke_test.sh https://deeppin.duckdns.org || {
              echo "=== Smoke test 失败，打印日志 / Smoke test failed, dumping logs ==="
              docker compose --env-file compose.env logs --tail 50
              exit 1
            }

            echo "部署完成 / Deployment complete"
