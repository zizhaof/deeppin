name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'compose.env'
      - 'searxng/**'
      - 'nginx/**'
      - 'scripts/**'

jobs:
  # ── Job 1: 单元测试（在 GitHub runner 上跑，不需要真实外部依赖）────────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"                          # 缓存 pip，避免每次重装 sentence-transformers
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration -q
        working-directory: backend
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_ANON_KEY: placeholder
          GROQ_API_KEYS: '["placeholder"]'
          LOG_DIR: /tmp/deeppin-logs   # main.py 默认写 /app/logs，CI 里重定向到 /tmp

  # ── Job 2: 部署（等单元测试通过才运行）──────────────────────────────────
  deploy:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Sync API keys to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            ENV_FILE=/home/ubuntu/deeppin/backend/.env

            update_key() {
              local KEY="$1" VAL="$2"
              [ -z "$VAL" ] && return
              # 先删除旧行，再追加新行（避免 sed 处理 JSON 特殊字符）
              grep -v "^${KEY}=" "$ENV_FILE" > "${ENV_FILE}.tmp" 2>/dev/null || true
              echo "${KEY}=${VAL}" >> "${ENV_FILE}.tmp"
              mv "${ENV_FILE}.tmp" "$ENV_FILE"
            }

            update_key CEREBRAS_API_KEYS '${{ secrets.CEREBRAS_API_KEYS }}'
            update_key SAMBANOVA_API_KEYS '${{ secrets.SAMBANOVA_API_KEYS }}'
            update_key GEMINI_API_KEYS '${{ secrets.GEMINI_API_KEYS }}'
            update_key NVIDIA_NIM_API_KEYS '${{ secrets.NVIDIA_NIM_API_KEYS }}'
            update_key OPENROUTER_API_KEYS '${{ secrets.OPENROUTER_API_KEYS }}'

      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/ubuntu/deeppin
            git pull origin main

            # backend + searxng 先启动（nginx 等它们 healthy 才起）
            docker compose --env-file compose.env up -d --build backend searxng

            # 等待 backend 进入 healthy 状态（backend /health 已聚合检查所有依赖）
            echo "等待 backend healthy... / Waiting for backend to become healthy..."
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' deeppin-backend-1 2>/dev/null || echo "unknown")
              echo "  Attempt $i: backend=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Backend healthy，所有依赖就绪 / Backend healthy, all dependencies ready"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "超时：backend 未能在 120s 内进入 healthy 状态 / Timeout waiting for backend healthy"
                docker compose --env-file compose.env logs backend --tail 30
                exit 1
              fi
              sleep 5
            done

            # nginx + 监控栈在依赖 healthy 后启动
            docker compose --env-file compose.env up -d nginx prometheus grafana

            # 清理旧镜像
            docker image prune -f

            # Smoke test：端到端连通性验证
            echo "运行 smoke test... / Running smoke test..."
            sleep 5
            bash scripts/smoke_test.sh https://deeppin.duckdns.org || {
              echo "=== Smoke test 失败，打印日志 / Smoke test failed, dumping logs ==="
              docker compose --env-file compose.env logs --tail 50
              exit 1
            }

            echo "部署完成 / Deployment complete"

  # ── Job 3: 集成测试（部署完成后，从 GitHub runner 打真实 API）────────────
  integration-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest httpx       # 只装轻量依赖，不装完整 backend 依赖

      - name: Run integration tests
        run: pytest tests/integration/ -v
        working-directory: backend
        env:
          TEST_BASE_URL: https://deeppin.duckdns.org
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}