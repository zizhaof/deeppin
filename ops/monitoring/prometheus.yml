# Prometheus scrape config (local dev).
# Backend runs on the host via uvicorn :8000; Prometheus reaches it through
# host.docker.internal. In production the prod-specific config file
# (prometheus.prod.yml) uses the compose service name instead.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: deeppin-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000   # local dev
        labels:
          env: local

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
