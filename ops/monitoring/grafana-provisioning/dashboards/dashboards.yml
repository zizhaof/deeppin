# Grafana dashboard provisioning — auto-load dashboard JSON files from
# this directory.
apiVersion: 1

providers:
  - name: deeppin
    orgId: 1
    folder: Deeppin
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
