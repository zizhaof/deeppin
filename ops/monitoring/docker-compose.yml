# Local monitoring stack.
# Start:
#   cd ops/monitoring && docker compose up -d
#
# Access:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3002    (admin / admin — forced password change on first login)
#
# Requires the backend running locally on :8000 (uvicorn main:app --reload --port 8000).

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: deeppin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle        # enables POST /-/reload for hot config reload
    extra_hosts:
      # host.docker.internal on Linux requires this line; Mac/Windows Docker
      # Desktop provides it automatically.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: deeppin-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"       # avoid clashing with the Next.js dev server on 3000/3001
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
