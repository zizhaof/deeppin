# Prometheus scrape config (production).
# Prometheus and backend share the same compose network, so the backend is
# reachable via the service name.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: deeppin-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
        labels:
          env: prod

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
