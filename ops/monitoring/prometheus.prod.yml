# Prometheus 抓取配置（生产）/ Prometheus scrape config (production)
# 生产环境：prometheus 跟 backend 在同一 compose network，直接用服务名 backend:8000
# Production: prometheus and backend share the same compose network; use service name backend:8000

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: deeppin-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
        labels:
          env: prod

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
