# Staging compose override: brings up only backend + searxng. nginx is NOT
# started here — staging reuses prod's nginx container. Container-internal
# ports stay the same as prod (8000/8080); only the host-side mapping moves:
# staging backend on host :8001, prod on :8000. Prod's nginx forwards to
# the staging backend via host-gateway.
#
# Usage:
#   docker compose -p deeppin-staging --env-file compose.staging.env \
#     -f docker-compose.yml -f docker-compose.staging.yml up -d backend searxng

services:
  backend:
    ports:
      # Bind to all interfaces (0.0.0.0); nginx reaches staging over the
      # docker bridge. External access is blocked by the Oracle security
      # group (8001/8081 are not in the open-port list).
      - "8001:8000"
    # volumes: inherited from base (./logs + shared hf-cache); no need to re-declare

  searxng:
    ports:
      - "8081:8080"

  # Reuse prod's nginx; do not start a second one on staging.
  nginx:
    profiles:
      - disabled
