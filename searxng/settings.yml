use_default_settings: true

server:
  secret_key: "please_change_this_to_a_random_string_before_deploying"
  limiter: false        # self-hosted for our own use; rate-limiter disabled
  image_proxy: false

search:
  formats:
    - html
    - json              # required — backend calls SearXNG with ?format=json
  default_lang: "auto"
