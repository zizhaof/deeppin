# Nginx config for prod + staging
# 两个 server block：
#   - deeppin.duckdns.org         → backend 容器 :8000（同 compose 网络）
#   - staging-deeppin.duckdns.org → staging backend 宿主机 :8001（通过 host-gateway）

# 让 nginx 容器能访问宿主机（staging backend 映射在 host 的 127.0.0.1:8001）
# 需要 docker-compose.yml 里加 extra_hosts: - "host.docker.internal:host-gateway"

# ────── PROD ──────
server {
    listen 80;
    server_name deeppin.duckdns.org;
    # ACME 续期挑战放前面，其它 HTTP 流量都 301 到 HTTPS
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name deeppin.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/deeppin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deeppin.duckdns.org/privkey.pem;

    # Grafana 子路径：走 compose 内网的 grafana:3000
    # Grafana at /grafana/ — proxied to compose-internal grafana:3000
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana websocket（live features）
    location /grafana/api/live/ {
        proxy_pass http://grafana:3000/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 屏蔽外网访问 /metrics（仅 compose 内网的 prometheus 容器可拉）
    # Block external /metrics access — only the compose-internal prometheus can scrape backend:8000/metrics
    location = /metrics { return 404; }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须配置：禁用缓冲，否则流式响应会卡住
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ────── STAGING ──────
server {
    listen 80;
    server_name staging-deeppin.duckdns.org;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name staging-deeppin.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/staging-deeppin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-deeppin.duckdns.org/privkey.pem;

    location / {
        # staging backend 是独立 compose project，监听宿主机 127.0.0.1:8001
        # nginx 容器通过 host.docker.internal 访问宿主机
        proxy_pass http://host.docker.internal:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
