# Nginx config for prod + staging.
# Two virtual hosts:
#   - deeppin.duckdns.org         → backend container :8000 (same compose network)
#   - staging-deeppin.duckdns.org → staging backend on the host at :8001
#                                   (reached via docker host-gateway)
#
# Note: for nginx to reach the staging backend on the host, the compose
# file adds `extra_hosts: ["host.docker.internal:host-gateway"]` to the
# nginx service.

# ────── PROD ──────
server {
    listen 80;
    server_name deeppin.duckdns.org;
    # ACME renewal challenge stays on HTTP; everything else is 301'd to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name deeppin.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/deeppin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deeppin.duckdns.org/privkey.pem;

    # Grafana sub-path: Grafana is started with SERVE_FROM_SUB_PATH, so it
    # expects the full /grafana/* path. proxy_pass without a trailing slash
    # preserves the /grafana/ prefix.
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana websocket (live features).
    location /grafana/api/live/ {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Block external /metrics access — only the compose-internal prometheus
    # container is allowed to scrape backend:8000/metrics.
    location = /metrics { return 404; }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE: disable buffering or streaming responses hang.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ────── STAGING ──────
server {
    listen 80;
    server_name staging-deeppin.duckdns.org;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name staging-deeppin.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/staging-deeppin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-deeppin.duckdns.org/privkey.pem;

    location / {
        # staging backend runs in a separate compose project and binds to
        # the host at 127.0.0.1:8001. Nginx reaches it through
        # host.docker.internal.
        proxy_pass http://host.docker.internal:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
