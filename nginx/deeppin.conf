# /etc/nginx/sites-available/deeppin
# 软链接到 sites-enabled: ln -s /etc/nginx/sites-available/deeppin /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.deeppin.ai;
    # 先用 HTTP，certbot 配好 SSL 后会自动修改这个文件
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.deeppin.ai;

    # certbot 配好后会自动填入证书路径
    # ssl_certificate     /etc/letsencrypt/live/api.deeppin.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.deeppin.ai/privkey.pem;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须配置：禁用缓冲，否则流式响应会卡住
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
