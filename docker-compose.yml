services:
  backend:
    build: ./backend
    restart: always
    expose:
      - "${BACKEND_PORT}"
    env_file: ./backend/.env
    environment:
      - SEARXNG_URL=${SEARXNG_INTERNAL}
    volumes:
      - ./logs:/app/logs   # 日志持久化到宿主机 / persist logs to host
    healthcheck:
      # CMD-SHELL 走 shell，支持变量；backend /health 聚合检查所有依赖（含 searxng/supabase）
      # CMD-SHELL runs via shell; backend /health aggregates all dependency checks
      # 503 → unhealthy（degraded），200 → healthy（all ok）
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 45s    # 给 LiteLLM Router 初始化留时间 / allow time for LiteLLM Router init

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    expose:
      - "${SEARXNG_PORT}"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:${SEARXNG_PORT}
    # SearXNG 无独立 healthcheck：bot detection 会拦截无 X-Forwarded-For 的内部 curl。
    # backend /health 已包含 searxng 连通性检查，nginx 只需等 backend healthy 即可。
    # No separate SearXNG healthcheck: bot detection blocks internal curl without X-Forwarded-For.
    # The backend /health endpoint already checks searxng; nginx only needs to wait for backend.

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./nginx/deeppin.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # Let's Encrypt 证书
      - ./nginx/webroot:/var/www/certbot:ro   # certbot webroot（HTTP-01 挑战 + 自动续期）
    extra_hosts:
      # 让 nginx 容器能访问宿主机上的 staging backend（127.0.0.1:8001）
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy   # backend healthy = backend + searxng + supabase 全部正常

  prometheus:
    # 监控栈 / Monitoring stack
    # 只 expose 到内网回环，通过 nginx 的 /grafana/ 访问 Grafana；Prometheus UI 仅限 SSH 隧道
    # Only exposed on loopback; Grafana is reached via nginx /grafana/; Prometheus UI via SSH tunnel
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./ops/monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"   # 仅监听本机回环 / loopback only

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://deeppin.duckdns.org/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
