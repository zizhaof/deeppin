services:
  backend:
    build: ./backend
    restart: always
    expose:
      - "${BACKEND_PORT}"
    env_file: ./backend/.env
    environment:
      - SEARXNG_URL=${SEARXNG_INTERNAL}
      # Let HuggingFace tokenizers fork for parallel encode (small speedup during
      # bge-m3 encode's tokenize step; safe since we don't fork post-import).
      - TOKENIZERS_PARALLELISM=true
    volumes:
      - ./logs:/app/logs                  # persist logs to host
      - hf-cache:/root/.cache/huggingface # shared HF model cache (prod & staging reuse the same bge-m3 copy)
    healthcheck:
      # CMD-SHELL runs via the shell so variables expand. The backend /health
      # endpoint aggregates every dependency (searxng, supabase, embedding);
      # 200 means all-ok, 503 means degraded.
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 45s    # give LiteLLM Router enough time to initialise

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    expose:
      - "${SEARXNG_PORT}"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:${SEARXNG_PORT}
    # No separate SearXNG healthcheck: its bot-detection blocks internal curl
    # without an X-Forwarded-For header. The backend /health already probes
    # searxng connectivity, so nginx can wait for backend to become healthy.

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./nginx/deeppin.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # Let's Encrypt certs
      - ./nginx/webroot:/var/www/certbot:ro    # certbot webroot (HTTP-01 challenge + auto-renew)
    extra_hosts:
      # Let the nginx container reach the staging backend on the host (127.0.0.1:8001).
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy   # "backend healthy" = backend + searxng + supabase all ok

  prometheus:
    # Monitoring stack. Only exposed on loopback; Grafana is reached via
    # nginx /grafana/, and the Prometheus UI is only accessible through an
    # SSH tunnel.
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./ops/monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"   # loopback only

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://deeppin.duckdns.org/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  hf-cache:
    external: true
    name: deeppin-hf-cache   # global named volume shared by prod & staging so we only store one copy of bge-m3 (~4.3G)
