services:
  backend:
    build: ./backend
    restart: always
    expose:
      - "${BACKEND_PORT}"
    env_file: ./backend/.env
    environment:
      - SEARXNG_URL=${SEARXNG_INTERNAL}
    volumes:
      - ./logs:/app/logs   # 日志持久化到宿主机 / persist logs to host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s    # 留时间给 LiteLLM Router 初始化 / allow time for LiteLLM Router init

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    expose:
      - "${SEARXNG_PORT}"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:${SEARXNG_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SEARXNG_PORT}/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./nginx/deeppin.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # Let's Encrypt 证书
    depends_on:
      backend:
        condition: service_healthy   # 等 backend healthy 才启动 / wait until backend is healthy
      searxng:
        condition: service_healthy
